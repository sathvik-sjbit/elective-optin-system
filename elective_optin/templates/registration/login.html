<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – ElectiveHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <i class="bi bi-mortarboard-fill text-white" style="font-size:3rem"></i>
                <h2 class="text-white fw-bold mt-2">ElectiveHub</h2>
                <p class="text-white-50">Priority-Based Elective Opt-In System</p>
            </div>
            <div class="card p-4">
                <h4 class="fw-bold mb-4 text-center">Welcome Back</h4>
                {% if form.errors %}
                <div class="alert alert-danger py-2">
                    <i class="bi bi-exclamation-circle me-2"></i>Invalid username or password.
                </div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-primary w-100 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>
                <hr class="my-3">
                <p class="text-center text-muted mb-0">
                    New student? <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Register here</a>
                </p>
            </div>
            <p class="text-center text-white-50 mt-3 small">
                <strong>Demo:</strong> admin / admin123 &nbsp;|&nbsp; student1 / pass1234
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
